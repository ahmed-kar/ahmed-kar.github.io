<svg width="100%" viewBox="0 0 680 510" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Two probability distributions over the same outcome from the same evidence</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Two overlapping probability distribution curves, one peaked on the left labelled Yes, one peaked on the right labelled No, representing the model giving different answers under different orderings of identical evidence.</desc>

<rect x="40" y="40" width="600" height="450" fill="#0e1117" rx="12" style="fill:rgb(14, 17, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<line x1="100" y1="380" x2="580" y2="380" stroke="#3a4555" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(58, 69, 85);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<path d="M 100 380 Q 180 380 220 340 Q 260 280 280 220 Q 300 160 320 220 Q 340 280 380 340 Q 420 380 580 380 Z" fill="#5dcaa5" fill-opacity="0.18" stroke="#5dcaa5" stroke-width="2" style="fill:rgb(93, 202, 165);stroke:rgb(93, 202, 165);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<path d="M 100 380 Q 260 380 300 340 Q 340 280 360 220 Q 380 160 400 220 Q 420 280 460 340 Q 500 380 580 380 Z" fill="#f08585" fill-opacity="0.18" stroke="#f08585" stroke-width="2" style="fill:rgb(240, 133, 133);stroke:rgb(240, 133, 133);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<line x1="300" y1="160" x2="300" y2="380" stroke="#5dcaa5" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(93, 202, 165);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-dasharray:2px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="380" y1="160" x2="380" y2="380" stroke="#f08585" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(240, 133, 133);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-dasharray:2px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="300" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#5dcaa5" style="fill:rgb(93, 202, 165);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, sans-serif;font-size:16px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Yes</text>
<text x="380" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#f08585" style="fill:rgb(240, 133, 133);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, sans-serif;font-size:16px;font-weight:500;text-anchor:middle;dominant-baseline:auto">No</text>

<text x="340" y="420" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#888" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, sans-serif;font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:auto">SAME EVIDENCE</text>
<text x="340" y="440" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1" fill="#666" style="fill:rgb(102, 102, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">two orderings</text>
</svg>