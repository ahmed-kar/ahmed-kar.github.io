<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading · Ahmed Karim</title>
  <meta name="description" content="A research reading list — open-ended world models, robotics, and ML foundations." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <style>
    /* ============ Reading page-specific ============ */
    .reading-hero {
      padding: 36px 0 18px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 28px;
    }
    .reading-hero .crumbs {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-faint);
      margin-bottom: 10px;
    }
    .reading-hero .crumbs a {
      color: var(--text-muted);
    }
    .reading-hero .crumbs a:hover {
      color: var(--accent);
    }
    .reading-hero h1 {
      font-family: var(--mono);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      color: var(--text);
    }
    .reading-hero .subtitle {
      font-family: var(--mono);
      font-size: 0.86rem;
      color: var(--text-muted);
      margin: 0;
      max-width: 640px;
      line-height: 1.6;
    }

    /* Progress bar */
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 18px;
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--rule);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-numbers {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .progress-numbers .sep { color: var(--text-faint); }
    .progress-percent {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      min-width: 48px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 7px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.84rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-faint); }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 6px 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--bg-soft);
    }

    /* Filter pills */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 5px 12px;
      border-radius: 3px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { color: var(--text); border-color: var(--text-muted); }
    .filter-pill.active {
      background: var(--bg-soft);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      background: var(--bg);
    }
    .card.expanded {
      grid-column: 1 / -1;
      padding: 0;
      background: var(--bg-soft);
    }
    .card:hover:not(.expanded) {
      border-color: var(--text-muted);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card.expanded .card-header { padding: 14px 18px; }
    .card-icon {
      font-size: 18px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-family: var(--mono);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--text);
    }
    .card-meta {
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--text-faint);
      margin-top: 2px;
    }
    .ring {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--text-muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .ring-inner {
      background: var(--bg);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card.expanded .ring-inner { background: var(--bg-soft); }

    /* Items */
    .items { padding: 0 18px 14px; }
    .items-divider {
      height: 1px;
      background: var(--rule);
      margin: 0 0 10px;
    }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px dotted var(--rule);
      transition: opacity 0.15s;
    }
    .item:last-child { border-bottom: none; }
    .item.done { opacity: 0.5; }
    .checkbox {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1.5px solid var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 10px;
      margin-top: 3px;
      font-weight: 700;
      cursor: pointer;
    }
    .checkbox:hover { border-color: var(--accent); }
    .item.done .checkbox {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }
    .item-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      min-width: 0;
    }
    .item-text {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.55;
      word-break: break-word;
    }
    .item.done .item-text {
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .note-indicator {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      color: var(--text-faint);
      font-weight: 700;
      margin-top: 2px;
      transition: color 0.15s, transform 0.15s;
    }
    .item.has-note .note-indicator { color: var(--accent); }
    .item-body:hover .note-indicator { color: var(--accent); transform: scale(1.15); }

    /* Inline note editor */
    .note-editor {
      margin: 4px 0 10px 26px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-left: 2px solid var(--accent);
      border-radius: 0 4px 4px 0;
      animation: noteFadeIn 0.15s ease-out;
    }
    @keyframes noteFadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .note-editor textarea {
      width: 100%;
      min-height: 90px;
      padding: 8px 10px;
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.6;
      resize: none;
      overflow: hidden;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
      display: block;
    }
    .note-editor textarea:focus { border-color: var(--accent); }
    .note-editor textarea::placeholder { color: var(--text-faint); }
    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-faint);
    }
    .note-actions { display: flex; gap: 6px; }
    .note-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 3px 9px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .note-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .note-clear:hover { color: #ef4444; border-color: #ef4444; }

    .icon-btn-link {
      display: inline-block;
      text-decoration: none;
      line-height: 1;
    }
    .icon-btn-link:hover { text-decoration: none; }
    mark {
      background: var(--accent);
      color: var(--bg);
      padding: 0 3px;
      border-radius: 2px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 28px;
      text-align: center;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 0.84rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      border: 1px solid var(--rule);
      color: var(--bg);
      padding: 8px 16px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.78rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span class="theme-icon-light" aria-hidden="true">☀</span>
    <span class="theme-icon-dark" aria-hidden="true">☾</span>
  </button>

  <main>

    <section class="reading-hero">
      <div class="crumbs"><a href="index.html">← Home</a></div>
      <h1>Reading</h1>
      <p class="subtitle">A live map of what I'm reading toward the PhD — open-ended world models for autonomous exploration, from foundations to extreme environments. Progress is saved locally in your browser.</p>
    </section>

    <div class="progress-bar">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-numbers">
        <span id="progress-done">0</span><span class="sep">/</span><span id="progress-total">0</span>
      </div>
      <div id="progress-percent" class="progress-percent">0.0%</div>
    </div>

    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="Search items, categories, notes…  ( / to focus )" />
      <span class="sync-status" id="sync-status" title="Cross-device sync status"><span class="dot"></span><span class="sync-label">…</span></span>
      <button class="icon-btn" id="sync-btn" title="Push notes to GitHub (cross-device)">sync</button>
      <a class="icon-btn icon-btn-link" href="notes.html" title="View all notes as a feed">notes →</a>
      <a class="icon-btn icon-btn-link" href="journal.html" title="Open free-form journal">journal →</a>
      <button class="icon-btn" id="export-btn" title="Download progress and notes as JSON">export</button>
      <button class="icon-btn" id="import-btn" title="Load progress and notes from JSON">import</button>
      <button class="icon-btn" id="reset-btn" title="Clear all progress and notes locally">reset</button>
      <input id="import-file" type="file" accept="application/json" style="display:none" />
    </div>

    <div class="filters" id="filters"></div>

    <div class="grid" id="grid"></div>

    <footer>
      <p>© <span id="year"></span> Ahmed Karim</p>
    </footer>
  </main>

  <div id="toast" class="toast"></div>

<script src="reading-data.js"></script>
<script src="sync.js"></script>
<script>
const categories = window.READING_CATEGORIES;
const groups = window.READING_GROUPS;
const STORAGE_KEY = window.READING_STORAGE_KEY;

const state = {
  completed: new Set(),
  notes: {},          // { itemKey: { text, updatedAt } }
  expanded: null,     // category id
  openNote: null,     // item key being edited inline
  filter: "all",
  query: "",
  dirty: false,       // unsynced changes since last successful push
  lastSync: null,     // ISO timestamp of last successful push
  syncing: false,     // in-flight push
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.completed)) state.completed = new Set(data.completed);
    if (data.notes && typeof data.notes === "object") state.notes = data.notes;
    if (typeof data.filter === "string") state.filter = data.filter;
    if (typeof data.dirty === "boolean") state.dirty = data.dirty;
    if (typeof data.lastSync === "string") state.lastSync = data.lastSync;
  } catch (e) {}
}
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed: [...state.completed],
      notes: state.notes,
      filter: state.filter,
      dirty: state.dirty,
      lastSync: state.lastSync,
      savedAt: new Date().toISOString(),
    }));
  } catch (e) {}
}
function markDirty() { state.dirty = true; updateSyncStatus(); }
const saveDebounced = (() => {
  let t;
  return () => { clearTimeout(t); t = setTimeout(save, 250); };
})();

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function autosize(ta) {
  if (!ta) return;
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}
function highlight(text, q) {
  const safe = escapeHtml(text);
  if (!q) return safe;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  return safe.replace(re, "<mark>$1</mark>");
}
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 1800);
}

function getAccent() {
  return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#0ea5e9';
}
function getRule() {
  return getComputedStyle(document.documentElement).getPropertyValue('--rule').trim() || '#dad7d0';
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  Object.entries(groups).forEach(([key, g]) => {
    const btn = document.createElement("button");
    btn.className = "filter-pill" + (state.filter === key ? " active" : "");
    btn.textContent = g.label;
    btn.onclick = () => { state.filter = key; save(); render(); };
    el.appendChild(btn);
  });
}

function itemMatchesQuery(catId, idx, itemText, q) {
  if (itemText.toLowerCase().includes(q)) return true;
  const note = state.notes[catId + "-" + idx];
  return !!(note && note.text && note.text.toLowerCase().includes(q));
}

function getDisplayedCategories() {
  const g = groups[state.filter] || groups.all;
  let cats = g.ids ? categories.filter(c => g.ids.includes(c.id)) : categories;
  const q = state.query.trim().toLowerCase();
  if (q) {
    cats = cats
      .map(c => {
        const titleHit = c.title.toLowerCase().includes(q);
        const matched = c.items.some((it, i) => itemMatchesQuery(c.id, i, it, q));
        if (titleHit || matched) return c;
        return null;
      })
      .filter(Boolean);
  }
  return cats;
}

function renderProgress() {
  const total = categories.reduce((s, c) => s + c.items.length, 0);
  const done = state.completed.size;
  const pct = total === 0 ? 0 : (done / total) * 100;
  document.getElementById("progress-done").textContent = done;
  document.getElementById("progress-total").textContent = total;
  document.getElementById("progress-percent").textContent = pct.toFixed(1) + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const cats = getDisplayedCategories();
  const q = state.query.trim();
  const accent = getAccent();
  const rule = getRule();

  if (cats.length === 0) {
    grid.innerHTML = '<div class="empty">no matches.</div>';
    return;
  }

  cats.forEach(cat => {
    const expanded = state.expanded === cat.id || (q && q.length > 0);
    const card = document.createElement("div");
    card.className = "card" + (expanded ? " expanded" : "");

    const completedCount = cat.items.filter((_, i) => state.completed.has(cat.id + "-" + i)).length;
    const noteCount = cat.items.filter((_, i) => {
      const n = state.notes[cat.id + "-" + i];
      return n && n.text && n.text.trim().length > 0;
    }).length;
    const progress = (completedCount / cat.items.length) * 100;
    const metaText = `${completedCount}/${cat.items.length} explored` +
      (noteCount > 0 ? ` · ${noteCount} note${noteCount === 1 ? "" : "s"}` : "");

    const header = document.createElement("div");
    header.className = "card-header";
    header.innerHTML = `
      <span class="card-icon">${escapeHtml(cat.icon)}</span>
      <div class="card-info">
        <div class="card-title">${highlight(cat.title, q)}</div>
        <div class="card-meta">${metaText}</div>
      </div>
      <div class="ring" style="background: conic-gradient(${accent} ${progress * 3.6}deg, ${rule} 0deg);"><div class="ring-inner">${Math.round(progress)}</div></div>
    `;
    header.onclick = () => {
      if (q) return;
      state.expanded = state.expanded === cat.id ? null : cat.id;
      state.openNote = null;
      render();
    };
    card.appendChild(header);

    if (expanded) {
      const items = document.createElement("div");
      items.className = "items";
      const divider = document.createElement("div");
      divider.className = "items-divider";
      items.appendChild(divider);

      cat.items.forEach((text, i) => {
        const key = cat.id + "-" + i;
        const done = state.completed.has(key);
        const note = state.notes[key];
        const hasNote = !!(note && note.text && note.text.trim().length > 0);
        const titleHit = cat.title.toLowerCase().includes((q || "").toLowerCase());
        if (q && !titleHit && !itemMatchesQuery(cat.id, i, text, q.toLowerCase())) return;

        const row = document.createElement("div");
        row.className = "item" + (done ? " done" : "") + (hasNote ? " has-note" : "");

        const checkbox = document.createElement("div");
        checkbox.className = "checkbox";
        checkbox.textContent = done ? "✓" : "";
        checkbox.onclick = (e) => {
          e.stopPropagation();
          if (state.completed.has(key)) state.completed.delete(key);
          else state.completed.add(key);
          save();
          render();
        };

        const body = document.createElement("div");
        body.className = "item-body";
        body.innerHTML = `
          <span class="item-text">${highlight(text, q)}</span>
          <span class="note-indicator" title="${hasNote ? "has notes" : "click to add notes"}">${hasNote ? "●" : "+"}</span>
        `;
        body.onclick = (e) => {
          e.stopPropagation();
          state.openNote = state.openNote === key ? null : key;
          render();
          if (state.openNote === key) {
            const ta = document.querySelector(`textarea[data-key="${key}"]`);
            if (ta) {
              ta.focus();
              ta.setSelectionRange(ta.value.length, ta.value.length);
            }
          }
        };

        row.appendChild(checkbox);
        row.appendChild(body);
        items.appendChild(row);

        if (state.openNote === key) {
          const editor = document.createElement("div");
          editor.className = "note-editor";
          const placeholder = "Notes on this paper… markdown supported (**bold**, *italic*, `code`, [link](url))";
          editor.innerHTML = `
            <textarea data-key="${escapeHtml(key)}" placeholder="${placeholder}">${escapeHtml(note ? note.text : "")}</textarea>
            <div class="note-meta">
              <span class="note-stamp">${note && note.updatedAt ? "updated " + new Date(note.updatedAt).toLocaleString() : "new note"}</span>
              <span class="note-actions">
                <button class="note-btn note-clear" type="button">clear</button>
                <button class="note-btn note-close" type="button">close</button>
              </span>
            </div>
          `;
          const ta = editor.querySelector("textarea");
          ta.addEventListener("click", e => e.stopPropagation());
          requestAnimationFrame(() => autosize(ta));
          ta.addEventListener("input", () => {
            autosize(ta);
            state.notes[key] = { text: ta.value, updatedAt: new Date().toISOString() };
            state.dirty = true;
            saveDebounced();
            updateSyncStatus();
          });
          editor.querySelector(".note-clear").onclick = (e) => {
            e.stopPropagation();
            if (!confirm("Clear this note?")) return;
            delete state.notes[key];
            SYNC.addTombstone(key);
            state.dirty = true;
            ta.value = "";
            save();
            render();
          };
          editor.querySelector(".note-close").onclick = (e) => {
            e.stopPropagation();
            state.openNote = null;
            save();
            render();
          };
          editor.onclick = e => e.stopPropagation();
          items.appendChild(editor);
        }
      });
      card.appendChild(items);
    }

    grid.appendChild(card);
  });
}

function render() {
  renderFilters();
  renderProgress();
  renderGrid();
}

const search = document.getElementById("search");
search.addEventListener("input", e => {
  state.query = e.target.value;
  render();
});

document.getElementById("export-btn").onclick = () => {
  const blob = new Blob([JSON.stringify({
    completed: [...state.completed],
    notes: state.notes,
    savedAt: new Date().toISOString(),
  }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "reading-progress-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
  toast("exported");
};

document.getElementById("import-btn").onclick = () => document.getElementById("import-file").click();
document.getElementById("import-file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    let imported = 0;
    if (Array.isArray(data.completed)) {
      state.completed = new Set(data.completed);
      imported = data.completed.length;
    }
    let noteCount = 0;
    if (data.notes && typeof data.notes === "object") {
      state.notes = data.notes;
      noteCount = Object.keys(data.notes).length;
    }
    if (imported > 0 || noteCount > 0) {
      if (noteCount > 0) state.dirty = true;
      save();
      render();
      updateSyncStatus();
      toast("imported " + imported + " items, " + noteCount + " notes");
    } else {
      toast("invalid file");
    }
  } catch {
    toast("invalid file");
  }
  e.target.value = "";
});

document.getElementById("reset-btn").onclick = () => {
  if (!confirm("Clear all progress AND notes locally? Use Sync afterwards if you want this reflected on GitHub.")) return;
  // Tombstone every existing note so a subsequent sync removes them remotely
  Object.keys(state.notes).forEach(k => SYNC.addTombstone(k));
  state.completed = new Set();
  state.notes = {};
  state.openNote = null;
  state.dirty = true;
  save();
  render();
  toast("reset (sync to push)");
};

document.addEventListener("keydown", (e) => {
  const inTextarea = document.activeElement && document.activeElement.tagName === "TEXTAREA";
  if (e.key === "/" && document.activeElement !== search && !inTextarea) {
    e.preventDefault();
    search.focus();
  } else if (e.key === "Escape" && document.activeElement === search) {
    search.value = "";
    state.query = "";
    render();
    search.blur();
  } else if (e.key === "Escape" && inTextarea) {
    document.activeElement.blur();
    state.openNote = null;
    save();
    render();
  }
});

window.addEventListener("pagehide", save);

// ---------- Sync ----------
function fmtRelativeTime(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
  return d.toLocaleDateString();
}

function updateSyncStatus() {
  const el = document.getElementById("sync-status");
  if (!el) return;
  const label = el.querySelector(".sync-label");
  el.classList.remove("dirty", "synced", "error");
  if (state.syncing) {
    el.classList.add("dirty");
    label.textContent = "syncing…";
  } else if (state.dirty) {
    el.classList.add("dirty");
    label.textContent = "unsynced";
  } else if (state.lastSync) {
    el.classList.add("synced");
    label.textContent = "synced " + fmtRelativeTime(state.lastSync);
  } else {
    label.textContent = "not synced";
  }
}

async function doSync() {
  if (state.syncing) return;
  state.syncing = true;
  updateSyncStatus();
  const result = await SYNC.syncNow(state.notes);
  state.syncing = false;
  if (result.ok) {
    state.dirty = false;
    state.lastSync = new Date().toISOString();
    save();
    updateSyncStatus();
    toast("synced to github ✓");
  } else if (result.reason === "no-pat" || result.reason === "bad-pat-cancelled") {
    updateSyncStatus();
  } else {
    const el = document.getElementById("sync-status");
    el.classList.remove("synced", "dirty");
    el.classList.add("error");
    el.querySelector(".sync-label").textContent = "sync failed";
    toast("sync failed — check console");
    console.error("sync failed", result.error);
  }
}

document.getElementById("sync-btn").onclick = doSync;

async function bootstrap() {
  load();
  render();
  updateSyncStatus();
  applyHash();
  render();
  const remote = await SYNC.loadRemote();
  if (remote !== null) {
    const tombs = SYNC.getTombstones();
    const before = JSON.stringify(state.notes);
    state.notes = SYNC.merge(state.notes, remote, tombs);
    const changed = JSON.stringify(state.notes) !== before;
    save();
    updateSyncStatus();
    // Don't tear down a textarea the user is typing into
    if (changed && !state.openNote) render();
  }
}

document.getElementById('year').textContent = new Date().getFullYear();

(function () {
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    render();
  });
})();

function applyHash() {
  const h = (location.hash || "").replace(/^#/, "");
  if (!h) return;
  const m = h.match(/^(.+)-(\d+)$/);
  if (!m) return;
  const catId = m[1];
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  state.expanded = catId;
  state.openNote = h;
  setTimeout(() => {
    const ta = document.querySelector(`textarea[data-key="${h}"]`);
    if (ta) {
      ta.scrollIntoView({ behavior: "smooth", block: "center" });
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }, 50);
}

window.addEventListener("hashchange", () => { applyHash(); render(); });

bootstrap();
</script>
