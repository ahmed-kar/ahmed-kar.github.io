<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal · Ahmed Karim</title>
  <meta name="description" content="Free-form notes — anything I want to write down, not tied to a reading list." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <style>
    .journal-hero {
      padding: 36px 0 18px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 28px;
    }
    .journal-hero .crumbs {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-faint);
      margin-bottom: 10px;
    }
    .journal-hero .crumbs a { color: var(--text-muted); }
    .journal-hero .crumbs a:hover { color: var(--accent); }
    .journal-hero .crumbs .sep { color: var(--text-faint); padding: 0 6px; }
    .journal-hero h1 {
      font-family: var(--mono);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      color: var(--text);
    }
    .journal-hero .subtitle {
      font-family: var(--mono);
      font-size: 0.86rem;
      color: var(--text-muted);
      margin: 0;
      max-width: 640px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 7px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.84rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-faint); }

    .sort-select {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 6px 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
    }
    .sort-select:hover { color: var(--accent); border-color: var(--accent); }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 6px 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
      line-height: 1;
    }
    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--bg-soft);
      text-decoration: none;
    }
    .icon-btn.primary {
      color: var(--accent);
      border-color: var(--accent);
    }
    .icon-btn.primary:hover { background: var(--bg-soft); }

    .summary {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-faint);
      margin-bottom: 16px;

    .feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .note-card {
      border: 1px solid var(--rule);
      border-radius: 6px;

      background: var(--bg);

    .note-card:hover { border-color: var(--text-muted); }
    .note-card.editing {

      background: var(--bg);
    }
    .note-card.composing {

      background: var(--bg);
    }

    .note-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .note-card-title-wrap { min-width: 0; flex: 1; }
    .note-card-title {
      font-family: var(--mono);
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.005em;
      line-height: 1.4;
      word-break: break-word;
      margin: 0;

    .note-card-title.untitled {
      color: var(--text-faint);
      font-weight: 400;
      font-style: italic;
    }
    .note-card-actions {
      display: flex;
      gap: 4px;
      align-items: flex-start;
      flex-shrink: 0;
    }
    .note-action {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 0.74rem;

      border-radius: 3px;

      border-color: var(--accent);
    }
    .note-action.danger:hover {

      border-color: #ef4444;
    }

      font-family: var(--mono);
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.7;
      word-break: break-word;

    .note-card-body p { margin: 0 0 10px; }
    .note-card-body p:last-child { margin-bottom: 0; }
    .note-card-body strong { font-weight: 700; color: var(--text); }
    .note-card-body em { font-style: italic; color: var(--text-muted); }
    .note-card-body code {
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0 4px;
      font-size: 0.8rem;
    }
    .note-card-body pre {
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .note-card-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.78rem;
    }
    .note-card-body ul {
      margin: 6px 0 10px;
      padding-left: 20px;
    }
    .note-card-body ul li { margin: 2px 0; }
    .note-card-body a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .note-card-body a:hover { color: var(--link-hover); }

    .note-card-footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px dotted var(--rule);
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Editor */
    .note-card .editor { display: none; }
    .note-card.editing .note-card-body,
    .note-card.editing .static-title { display: none; }
    .note-card.editing .editor,
    .note-card.composing .editor { display: block; }
    .note-card.composing .static-title { display: none; }

    .editor-title {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: -0.005em;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .editor-title:focus { border-color: var(--accent); }
    .editor-title::placeholder { color: var(--text-faint); font-weight: 400; font-style: italic; }

    .editor textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px 12px;
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.65;

      overflow: hidden;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
      display: block;

    .editor textarea:focus { border-color: var(--accent); }
    .editor textarea::placeholder { color: var(--text-faint); }
    .editor-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 8px;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-faint);
    }
    .editor-actions { display: flex; gap: 6px; }
    .editor-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 4px 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.74rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-btn:hover { color: var(--accent); border-color: var(--accent); }
    .editor-btn.primary {
      color: var(--accent);
      border-color: var(--accent);
    }
    .editor-btn.primary:hover { background: var(--bg-soft); }

    .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 0.86rem;
      border: 1px dashed var(--rule);
      border-radius: 6px;
      line-height: 1.7;
    }
    .empty .big { font-size: 2rem; display: block; margin-bottom: 8px; }
    .empty a { color: var(--accent); }

    mark {
      background: var(--accent);
      color: var(--bg);
      padding: 0 3px;
      border-radius: 2px;

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);

      border: 1px solid var(--rule);
      color: var(--bg);
      padding: 8px 16px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.78rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>

<script src="sync.js"></script>
<script>
const STORAGE_KEY = "ahmed-journal-v1";
const JOURNAL_SYNC = window.createSync({
  filePath: "journal.json",
  tombKey:  "ahmed-journal-tombstones-v1",
});

const state = {
  notes: {},          // { id: { title, body, createdAt, updatedAt } }
  query: "",
  sort: "recent",
  editing: null,      // id being edited (or "new" for the composer)
  draftTitle: "",
  draftBody: "",
  dirty: false,
  lastSync: null,
  syncing: false,
};

function newId() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "j-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.notes && typeof data.notes === "object") state.notes = data.notes;
    if (typeof data.dirty === "boolean") state.dirty = data.dirty;
    if (typeof data.lastSync === "string") state.lastSync = data.lastSync;
  } catch (e) {}
}
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      notes: state.notes,
      dirty: state.dirty,
      lastSync: state.lastSync,
      savedAt: new Date().toISOString(),
    }));
  } catch (e) {}
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function autosize(ta) {
  if (!ta) return;
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}

function renderMarkdown(text) {
  if (!text) return "";
  let s = escapeHtml(text);

  s = s.replace(/```[a-zA-Z0-9]*\n?([\s\S]*?)```/g, (_, code) =>
    ` PRE ${code.replace(/\n+$/,"")} ENDPRE `);
  s = s.replace(/`([^`\n]+)`/g, ' C $1 ENDC ');
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => {
    if (!/^(https?:\/\/|mailto:|\/|#|reading\.html|notes\.html|journal\.html)/i.test(u)) return m;
    return `<a href="${u.replace(/"/g,'&quot;')}" target="_blank" rel="noopener">${t}</a>`;
  });

  const blocks = s.split(/\n{2,}/);
  const html = blocks.map(b => {
    b = b.replace(/^\n+|\n+$/g, "");
    if (!b) return "";
    if (b.includes(" PRE ")) return b;
    const lines = b.split("\n");
    if (lines.length > 0 && lines.every(l => /^\s*[-*]\s+/.test(l))) {
      return "<ul>" + lines.map(l => "<li>" + l.replace(/^\s*[-*]\s+/, "") + "</li>").join("") + "</ul>";
    }
    return "<p>" + lines.join("<br>") + "</p>";
  }).join("");

  return html
    .replace(/ PRE ([\s\S]*?) ENDPRE /g, (_, code) => `<pre><code>${code}</code></pre>`)
    .replace(/ C ([\s\S]*?) ENDC /g, (_, code) => `<code>${code}</code>`);
}

function highlight(html, q) {
  if (!q) return html;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  let out = "";
  let inTag = false;
  let buf = "";
  for (let i = 0; i < html.length; i++) {
    const ch = html[i];
    if (ch === "<") {
      if (buf) { out += buf.replace(re, "<mark>$1</mark>"); buf = ""; }
      inTag = true;
      out += ch;
    } else if (ch === ">") {
      inTag = false;
      out += ch;
    } else if (inTag) {
      out += ch;
    } else {
      buf += ch;
    }
  }
  if (buf) out += buf.replace(re, "<mark>$1</mark>");
  return out;
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 1800);
}

function fmtDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  } catch { return iso; }
}

function getEntries() {
  return Object.entries(state.notes)
    .filter(([_, v]) => v && typeof v === "object")
    .map(([id, v]) => ({
      id,
      title: (v.title || "").trim(),
      body:  v.body || "",
      createdAt: v.createdAt || v.updatedAt || "",
      updatedAt: v.updatedAt || "",
    }));
}

function getDisplayed() {
  let entries = getEntries();
  const q = state.query.trim().toLowerCase();
  if (q) {
    entries = entries.filter(e =>
      e.title.toLowerCase().includes(q) ||
      e.body.toLowerCase().includes(q)
    );
  }
  switch (state.sort) {
    case "recent":
      entries.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
      break;
    case "oldest":
      entries.sort((a, b) => (a.updatedAt || "").localeCompare(b.updatedAt || ""));
      break;
    case "alpha":
      entries.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
      break;
  }
  return entries;
}

function renderSummary(shown) {
  const total = getEntries().length;
  const summary = document.getElementById("summary");
  if (total === 0) { summary.textContent = ""; return; }
  if (shown === total) {
    summary.textContent = `${total} note${total === 1 ? "" : "s"}.`;
  } else {
    summary.textContent = `showing ${shown} of ${total} note${total === 1 ? "" : "s"}.`;
  }
}

function buildComposerCard() {
  const card = document.createElement("article");
  card.className = "note-card composing";
  card.innerHTML = `
    <div class="editor">
      <input class="editor-title" type="text" placeholder="title (optional)" />
      <textarea placeholder="Write anything… markdown supported (**bold**, *italic*, \`code\`, [link](url), - bullets)"></textarea>
      <div class="editor-meta">
        <span>new note</span>
        <span class="editor-actions">
          <button class="editor-btn cancel-btn" type="button">cancel</button>
          <button class="editor-btn primary save-btn" type="button">save</button>
        </span>
      </div>
    </div>
  `;
  const titleEl = card.querySelector(".editor-title");
  const ta = card.querySelector("textarea");
  titleEl.value = state.draftTitle || "";
  ta.value = state.draftBody || "";
  requestAnimationFrame(() => autosize(ta));
  titleEl.addEventListener("input", () => { state.draftTitle = titleEl.value; });
  ta.addEventListener("input", () => { state.draftBody = ta.value; autosize(ta); });

  const finishKeys = (ev) => {
    if (ev.key === "Escape") { ev.preventDefault(); cancelEdit(); }
    if ((ev.metaKey || ev.ctrlKey) && ev.key === "Enter") { ev.preventDefault(); saveNew(); }
  };
  titleEl.addEventListener("keydown", finishKeys);
  ta.addEventListener("keydown", finishKeys);

  card.querySelector(".cancel-btn").onclick = cancelEdit;
  card.querySelector(".save-btn").onclick = saveNew;
  return card;
}

function buildNoteCard(e) {
  const card = document.createElement("article");
  const isEditing = state.editing === e.id;
  card.className = "note-card" + (isEditing ? " editing" : "");

  const q = state.query.trim();
  const titleText = e.title || "";
  const titleHtml = titleText
    ? highlight(escapeHtml(titleText), q)
    : '<span class="untitled">untitled</span>';
  const bodyHtml = highlight(renderMarkdown(e.body), q);

  const header = document.createElement("div");
  header.className = "note-card-header";
  header.innerHTML = `
    <div class="note-card-title-wrap static-title">
      <h3 class="note-card-title${titleText ? "" : " untitled"}">${titleHtml}</h3>
    </div>
    <div class="note-card-actions">
      <button class="note-action edit-btn" type="button">edit</button>
      <button class="note-action danger delete-btn" type="button">delete</button>
    </div>
  `;
  card.appendChild(header);

  const body = document.createElement("div");
  body.className = "note-card-body";
  body.innerHTML = bodyHtml || '<p style="color:var(--text-faint);font-style:italic;">(empty)</p>';
  card.appendChild(body);

  // Editor
  const editor = document.createElement("div");
  editor.className = "editor";
  editor.innerHTML = `
    <input class="editor-title" type="text" placeholder="title (optional)" />
    <textarea placeholder="Write anything… markdown supported"></textarea>
    <div class="editor-meta">
      <span>updated ${fmtDate(e.updatedAt)}</span>
      <span class="editor-actions">
        <button class="editor-btn cancel-btn" type="button">cancel</button>
        <button class="editor-btn primary save-btn" type="button">save</button>
      </span>
    </div>
  `;
  card.appendChild(editor);

  const footer = document.createElement("div");
  footer.className = "note-card-footer";
  const created = e.createdAt && e.createdAt !== e.updatedAt
    ? `created ${fmtDate(e.createdAt)}`
    : "";
  footer.innerHTML = `<span>updated ${fmtDate(e.updatedAt)}</span>${created ? `<span>${created}</span>` : ""}`;
  card.appendChild(footer);

  // Wire editor
  const titleEl = editor.querySelector(".editor-title");
  const ta = editor.querySelector("textarea");
  if (isEditing) {
    titleEl.value = state.draftTitle;
    ta.value = state.draftBody;
    requestAnimationFrame(() => autosize(ta));
  } else {
    titleEl.value = e.title;
    ta.value = e.body;
  }
  titleEl.addEventListener("input", () => { state.draftTitle = titleEl.value; });
  ta.addEventListener("input", () => { state.draftBody = ta.value; autosize(ta); });
  const finishKeys = (ev) => {
    if (ev.key === "Escape") { ev.preventDefault(); cancelEdit(); }
    if ((ev.metaKey || ev.ctrlKey) && ev.key === "Enter") { ev.preventDefault(); saveEdit(e.id); }
  };
  titleEl.addEventListener("keydown", finishKeys);
  ta.addEventListener("keydown", finishKeys);

  header.querySelector(".edit-btn").onclick = () => {
    state.editing = e.id;
    state.draftTitle = e.title;
    state.draftBody = e.body;
    render();
    const t = document.querySelector(`[data-edit-id="${e.id}"] textarea`);
    if (t) { t.focus(); t.setSelectionRange(t.value.length, t.value.length); }
  };
  header.querySelector(".delete-btn").onclick = () => {
    if (!confirm("Delete this note locally? Sync afterwards to remove it on GitHub too.")) return;
    delete state.notes[e.id];
    JOURNAL_SYNC.addTombstone(e.id);
    state.dirty = true;
    if (state.editing === e.id) { state.editing = null; state.draftTitle = ""; state.draftBody = ""; }
    save();
    render();
    updateSyncStatus();
    toast("note deleted (sync to push)");
  };
  editor.querySelector(".cancel-btn").onclick = cancelEdit;
  editor.querySelector(".save-btn").onclick = () => saveEdit(e.id);

  card.setAttribute("data-edit-id", e.id);
  return card;
}

function cancelEdit() {
  state.editing = null;
  state.draftTitle = "";
  state.draftBody = "";
  render();
}

function saveNew() {
  const title = (state.draftTitle || "").trim();
  const body  = state.draftBody || "";
  if (!title && !body.trim()) {
    cancelEdit();
    return;
  }
  const id = newId();
  const now = new Date().toISOString();
  state.notes[id] = { title, body, createdAt: now, updatedAt: now };
  state.dirty = true;
  state.editing = null;
  state.draftTitle = "";
  state.draftBody = "";
  save();
  render();
  updateSyncStatus();
  toast("saved locally — sync to push");
}

function saveEdit(id) {
  const title = (state.draftTitle || "").trim();
  const body  = state.draftBody || "";
  if (!title && !body.trim()) {
    if (confirm("Empty note — delete it locally?")) {
      delete state.notes[id];
      JOURNAL_SYNC.addTombstone(id);
      state.dirty = true;
      save();
    }
  } else {
    const existing = state.notes[id] || {};
    state.notes[id] = {
      title,
      body,
      createdAt: existing.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    state.dirty = true;
    save();
    toast("saved locally — sync to push");
  }
  state.editing = null;
  state.draftTitle = "";
  state.draftBody = "";
  render();
  updateSyncStatus();
}

function startNewNote() {
  state.editing = "new";
  state.draftTitle = "";
  state.draftBody = "";
  render();
  const t = document.querySelector(".note-card.composing .editor-title");
  if (t) t.focus();
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  if (state.editing === "new") {
    feed.appendChild(buildComposerCard());
    requestAnimationFrame(() => {
      const t = document.querySelector(".note-card.composing .editor-title");
      if (t && document.activeElement !== t) t.focus();
    });
  }

  const entries = getDisplayed();
  renderSummary(entries.length);

  if (entries.length === 0 && state.editing !== "new") {
    const total = getEntries().length;
    const empty = document.createElement("div");
    empty.className = "empty";
    if (total === 0) {
      empty.innerHTML = `
        <span class="big">·</span>
        Empty journal.<br>
        Hit <strong>+ new</strong> (or press <code>n</code>) to write your first note.
      `;
    } else {
      empty.innerHTML = `No notes match the current search.`;
    }
    feed.appendChild(empty);
    return;
  }

  entries.forEach(e => feed.appendChild(buildNoteCard(e)));
}

function render() {
  renderFeed();
}

document.getElementById("search").addEventListener("input", e => {
  state.query = e.target.value;
  render();
});
document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});
document.getElementById("new-btn").onclick = startNewNote;

document.addEventListener("keydown", (e) => {
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const inField = tag === "TEXTAREA" || tag === "INPUT";
  const search = document.getElementById("search");
  if (e.key === "/" && document.activeElement !== search && !inField) {
    e.preventDefault();
    search.focus();
  } else if (e.key === "Escape" && document.activeElement === search) {
    search.value = "";
    state.query = "";
    render();
    search.blur();
  } else if ((e.key === "n" || e.key === "N") && !inField && !e.metaKey && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    startNewNote();
  }
});

document.getElementById("year").textContent = new Date().getFullYear();

(function () {
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  btn.addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    const next = current === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("theme", next); } catch (e) {}
  });
})();

window.addEventListener("storage", (e) => {
  if (e.key === STORAGE_KEY) { load(); render(); updateSyncStatus(); }
});
window.addEventListener("pagehide", save);

// ---------- Sync ----------
function fmtRelativeTime(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
  return d.toLocaleDateString();
}

function updateSyncStatus() {
  const el = document.getElementById("sync-status");
  if (!el) return;
  const label = el.querySelector(".sync-label");
  el.classList.remove("dirty", "synced", "error");
  if (state.syncing) {
    el.classList.add("dirty");
    label.textContent = "syncing…";
  } else if (state.dirty) {
    el.classList.add("dirty");
    label.textContent = "unsynced";
  } else if (state.lastSync) {
    el.classList.add("synced");
    label.textContent = "synced " + fmtRelativeTime(state.lastSync);
  } else {
    label.textContent = "not synced";
  }
}

async function doSync() {
  if (state.syncing) return;
  state.syncing = true;
  updateSyncStatus();
  const result = await JOURNAL_SYNC.syncNow(state.notes, { message: `journal: update (${Object.keys(state.notes).length} notes)` });
  state.syncing = false;
  if (result.ok) {
    state.dirty = false;
    state.lastSync = new Date().toISOString();
    save();
    updateSyncStatus();
    toast("synced to github ✓");
  } else if (result.reason === "no-pat" || result.reason === "bad-pat-cancelled") {
    updateSyncStatus();
  } else {
    const el = document.getElementById("sync-status");
    el.classList.remove("synced", "dirty");
    el.classList.add("error");
    el.querySelector(".sync-label").textContent = "sync failed";
    toast("sync failed — check console");
    console.error("sync failed", result.error);
  }
}

document.getElementById("sync-btn").onclick = doSync;

async function bootstrap() {
  load();
  render();
  updateSyncStatus();
  const remote = await JOURNAL_SYNC.loadRemote();
  if (remote !== null) {
    const tombs = JOURNAL_SYNC.getTombstones();
    const before = JSON.stringify(state.notes);
    state.notes = JOURNAL_SYNC.merge(state.notes, remote, tombs);
    const changed = JSON.stringify(state.notes) !== before;
    save();
    updateSyncStatus();
    if (changed && !state.editing) render();
  }
}

bootstrap();
</script>
