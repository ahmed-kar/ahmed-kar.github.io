<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes · Ahmed Karim</title>
  <meta name="description" content="Reading notes — thoughts and reflections on papers from the reading list." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <style>
    .notes-hero {
      padding: 36px 0 18px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 28px;
    }
    .notes-hero .crumbs {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-faint);
      margin-bottom: 10px;
    }
    .notes-hero .crumbs a { color: var(--text-muted); }
    .notes-hero .crumbs a:hover { color: var(--accent); }
    .notes-hero .crumbs .sep { color: var(--text-faint); padding: 0 6px; }
    .notes-hero h1 {
      font-family: var(--mono);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      color: var(--text);
    }
    .notes-hero .subtitle {
      font-family: var(--mono);
      font-size: 0.86rem;
      color: var(--text-muted);
      margin: 0;
      max-width: 640px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 7px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.84rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-faint); }

    .sort-select {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 6px 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;

    .sort-select:hover { color: var(--accent); border-color: var(--accent); }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 6px 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;

      line-height: 1;

    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--bg-soft);
      text-decoration: none;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 5px 12px;
      border-radius: 3px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;

      transition: all 0.15s;

    .note-card-tags {

      font-size: 0.72rem;

    .done-badge {

      border: 1px solid var(--accent);

    .note-card-actions {

      gap: 4px;
      align-items: flex-start;
      flex-shrink: 0;

      border: 1px solid transparent;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 0.74rem;

    .note-action:hover {

      border-color: var(--accent);
    }
    .note-action.danger:hover {

      border-color: #ef4444;
    }

    .note-card-body {
      font-family: var(--mono);
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.7;
      word-break: break-word;

    .note-card-body p { margin: 0 0 10px; }
    .note-card-body p:last-child { margin-bottom: 0; }
    .note-card-body strong { font-weight: 700; color: var(--text); }
    .note-card-body em { font-style: italic; color: var(--text-muted); }
    .note-card-body code {

      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0 4px;
      font-size: 0.8rem;

    .note-card-body pre {
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .note-card-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.78rem;
    }
    .note-card-body ul {
      margin: 6px 0 10px;

    .note-card-body ul li { margin: 2px 0; }
    .note-card-body a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .note-card-body a:hover { color: var(--link-hover); }

    .note-card-footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px dotted var(--rule);

    /* Edit mode */
    .note-card.editing { border-color: var(--accent); }
    .note-card .editor { display: none; }
    .note-card.editing .note-card-body { display: none; }
    .note-card.editing .editor { display: block; }
    .editor textarea {
      width: 100%;
      min-height: 140px;
      padding: 10px 12px;
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.65;
      resize: none;
      overflow: hidden;
      outline: none;

      transition: border-color 0.15s;
      display: block;
    }
    .editor textarea:focus { border-color: var(--accent); }
    .editor-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-faint);
    }
    .editor-actions { display: flex; gap: 6px; }
    .editor-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 4px 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.74rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-btn:hover { color: var(--accent); border-color: var(--accent); }
    .editor-btn.primary {
      color: var(--accent);
      border-color: var(--accent);
    }
    .editor-btn.primary:hover { background: var(--bg-soft); }

    .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 0.86rem;
      border: 1px dashed var(--rule);
      border-radius: 6px;
      line-height: 1.7;
    }
    .empty .big { font-size: 2rem; display: block; margin-bottom: 8px; }

    mark {
      background: var(--accent);
      color: var(--bg);
      padding: 0 3px;
      border-radius: 2px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      border: 1px solid var(--rule);
      color: var(--bg);
      padding: 8px 16px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.78rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span class="theme-icon-light" aria-hidden="true">☀</span>
    <span class="theme-icon-dark" aria-hidden="true">☾</span>
  </button>

  <main>

    <section class="notes-hero">
      <div class="crumbs">
        <a href="index.html">← Home</a>
        <span class="sep">·</span>
        <a href="reading.html">← Reading</a>
      </div>
      <h1>Notes</h1>
      <p class="subtitle">Thoughts on what I'm reading. Each note is tied to a paper from the reading list — same browser storage, so the two pages stay in sync. Markdown supported (<code>**bold**</code>, <code>*italic*</code>, <code>`code`</code>, links, lists).</p>
    </section>

    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="Search notes, papers, categories…  ( / to focus )" />
      <select id="sort" class="sort-select" title="Sort order">
        <option value="recent">recent first</option>
        <option value="oldest">oldest first</option>
        <option value="category">by category</option>
        <option value="alpha">a–z by paper</option>
      </select>
      <span class="sync-status" id="sync-status" title="Cross-device sync status"><span class="dot"></span><span class="sync-label">…</span></span>
      <button class="icon-btn" id="sync-btn" title="Push notes to GitHub (cross-device)">sync</button>
      <a class="icon-btn" href="reading.html" title="Back to reading list">reading →</a>
    </div>

    <div class="filters" id="filters"></div>

    <div class="summary" id="summary"></div>

    <div class="feed" id="feed"></div>

    </footer>
  </main>

  <div id="toast" class="toast"></div>

<script src="reading-data.js"></script>
<script src="sync.js"></script>
<script>
const categories = window.READING_CATEGORIES;
const STORAGE_KEY = window.READING_STORAGE_KEY;

const catById = Object.fromEntries(categories.map(c => [c.id, c]));

const state = {
  completed: new Set(),
  notes: {},          // { itemKey: { text, updatedAt } }
  query: "",
  sort: "recent",
  catFilter: "all",
  editing: null,      // itemKey being edited
  draft: "",          // current edit textarea content (in-memory)
  dirty: false,
  lastSync: null,
  syncing: false,
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.completed)) state.completed = new Set(data.completed);
    if (data.notes && typeof data.notes === "object") state.notes = data.notes;
    if (typeof data.dirty === "boolean") state.dirty = data.dirty;
    if (typeof data.lastSync === "string") state.lastSync = data.lastSync;
  } catch (e) {}
}
function save() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const existing = raw ? JSON.parse(raw) : {};
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      ...existing,
      completed: [...state.completed],
      notes: state.notes,
      dirty: state.dirty,
      lastSync: state.lastSync,
      savedAt: new Date().toISOString(),
    }));
  } catch (e) {}
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function autosize(ta) {
  if (!ta) return;
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}

function renderMarkdown(text) {
  if (!text) return "";
  let s = escapeHtml(text);

  // Fenced code blocks ```...```
  s = s.replace(/```[a-zA-Z0-9]*\n?([\s\S]*?)```/g, (_, code) =>
    `␀PRE␀${code.replace(/\n+$/,"")}␀ENDPRE␀`);

  // Inline code `...`
  s = s.replace(/`([^`\n]+)`/g, '␀C␀$1␀ENDC␀');

  // Bold then italic
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');

  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => {
    if (!/^(https?:\/\/|mailto:|\/|#|reading\.html|notes\.html)/i.test(u)) return m;
    return `<a href="${u.replace(/"/g,'&quot;')}" target="_blank" rel="noopener">${t}</a>`;
  });

  // Paragraphs / bullet lists
  const blocks = s.split(/\n{2,}/);
  const html = blocks.map(b => {
    b = b.replace(/^\n+|\n+$/g, "");
    if (!b) return "";
    if (b.includes("␀PRE␀")) return b; // handled below
    const lines = b.split("\n");
    if (lines.length > 0 && lines.every(l => /^\s*[-*]\s+/.test(l))) {
      return "<ul>" + lines.map(l => "<li>" + l.replace(/^\s*[-*]\s+/, "") + "</li>").join("") + "</ul>";
    }
    return "<p>" + lines.join("<br>") + "</p>";
  }).join("");

  // Restore code markers
  return html
    .replace(/␀PRE␀([\s\S]*?)␀ENDPRE␀/g, (_, code) => `<pre><code>${code}</code></pre>`)
    .replace(/␀C␀([\s\S]*?)␀ENDC␀/g, (_, code) => `<code>${code}</code>`);
}

function highlight(html, q) {
  if (!q) return html;
  // Highlight only outside HTML tags
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  let out = "";
  let inTag = false;
  let buf = "";
  for (let i = 0; i < html.length; i++) {
    const ch = html[i];
    if (ch === "<") {
      if (buf) { out += buf.replace(re, "<mark>$1</mark>"); buf = ""; }
      inTag = true;
      out += ch;
    } else if (ch === ">") {
      inTag = false;
      out += ch;
    } else if (inTag) {
      out += ch;
    } else {
      buf += ch;
    }
  }
  if (buf) out += buf.replace(re, "<mark>$1</mark>");
  return out;
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 1800);
}

function parseKey(key) {
  // key format: "<categoryId>-<index>" — but some cat ids contain dashes
  // Find the last "-<digits>" suffix
  const m = key.match(/^(.+)-(\d+)$/);
  if (!m) return null;
  return { catId: m[1], idx: parseInt(m[2], 10) };
}

function getNotesEntries() {
  return Object.entries(state.notes)
    .filter(([_, v]) => v && v.text && v.text.trim().length > 0)
    .map(([key, v]) => {
      const parsed = parseKey(key);
      if (!parsed) return null;
      const cat = catById[parsed.catId];
      if (!cat) return null;
      const itemText = cat.items[parsed.idx];
      if (!itemText) return null;
      return {
        key,
        catId: parsed.catId,
        cat,
        idx: parsed.idx,
        title: itemText,
        text: v.text,
        updatedAt: v.updatedAt || "",
        done: state.completed.has(key),
      };
    })
    .filter(Boolean);
}

function getDisplayed() {
  let entries = getNotesEntries();

  if (state.catFilter !== "all") {
    entries = entries.filter(e => e.catId === state.catFilter);
  }

  const q = state.query.trim().toLowerCase();
  if (q) {
    entries = entries.filter(e =>
      e.title.toLowerCase().includes(q) ||
      e.text.toLowerCase().includes(q) ||
      e.cat.title.toLowerCase().includes(q)
    );
  }

  switch (state.sort) {
    case "recent":
      entries.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
      break;
    case "oldest":
      entries.sort((a, b) => (a.updatedAt || "").localeCompare(b.updatedAt || ""));
      break;
    case "category":
      entries.sort((a, b) =>
        a.cat.title.localeCompare(b.cat.title) ||
        a.title.localeCompare(b.title)
      );
      break;
    case "alpha":
      entries.sort((a, b) => a.title.localeCompare(b.title));
      break;
  }
  return entries;
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";

  const allEntries = getNotesEntries();
  const counts = {};
  allEntries.forEach(e => { counts[e.catId] = (counts[e.catId] || 0) + 1; });

  const all = document.createElement("button");
  all.className = "filter-pill" + (state.catFilter === "all" ? " active" : "");
  all.innerHTML = `all <span class="count">${allEntries.length}</span>`;
  all.onclick = () => { state.catFilter = "all"; render(); };
  el.appendChild(all);

  // Categories with at least one note, in original order
  categories.forEach(cat => {
    if (!counts[cat.id]) return;
    const btn = document.createElement("button");
    btn.className = "filter-pill" + (state.catFilter === cat.id ? " active" : "");
    btn.innerHTML = `${escapeHtml(cat.icon)} ${escapeHtml(cat.title)} <span class="count">${counts[cat.id]}</span>`;
    btn.onclick = () => { state.catFilter = cat.id; render(); };
    el.appendChild(btn);
  });
}

function renderSummary(entries) {
  const total = getNotesEntries().length;
  const summary = document.getElementById("summary");
  if (total === 0) { summary.textContent = ""; return; }
  if (entries.length === total) {
    summary.textContent = `${total} note${total === 1 ? "" : "s"} across ${new Set(getNotesEntries().map(e => e.catId)).size} categor${new Set(getNotesEntries().map(e => e.catId)).size === 1 ? "y" : "ies"}.`;
  } else {
    summary.textContent = `showing ${entries.length} of ${total} note${total === 1 ? "" : "s"}.`;
  }
}

function fmtDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return "just now";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  } catch { return iso; }
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const entries = getDisplayed();
  renderSummary(entries);

  if (entries.length === 0) {
    const total = getNotesEntries().length;
    const empty = document.createElement("div");
    empty.className = "empty";
    if (total === 0) {
      empty.innerHTML = `
        <span class="big">·</span>
        No notes yet.<br>
        Head over to the <a href="reading.html">reading list</a> and click any paper to add your thoughts.
      `;
    } else {
      empty.innerHTML = `No notes match the current filters.`;
    }
    feed.appendChild(empty);
    return;
  }

  const q = state.query.trim();

  entries.forEach(e => {
    const card = document.createElement("article");
    card.className = "note-card" + (state.editing === e.key ? " editing" : "");

    const titleHtml = highlight(escapeHtml(e.title), q);
    const bodyHtml = highlight(renderMarkdown(e.text), q);

    const header = document.createElement("div");
    header.className = "note-card-header";
    header.innerHTML = `
      <div class="note-card-title-wrap">
        <div class="note-card-title">
          <a href="reading.html#${escapeHtml(e.key)}">${titleHtml}</a>
        </div>
        <div class="note-card-tags">
          <span class="cat-tag" data-cat="${escapeHtml(e.catId)}">
            <span class="icon">${escapeHtml(e.cat.icon)}</span>${escapeHtml(e.cat.title)}
          </span>
          ${e.done ? '<span class="done-badge">read</span>' : ''}
        </div>
      </div>
      <div class="note-card-actions">
        <button class="note-action edit-btn" type="button">edit</button>
        <button class="note-action danger delete-btn" type="button">delete</button>
      </div>
    `;
    card.appendChild(header);

    const body = document.createElement("div");
    body.className = "note-card-body";
    body.innerHTML = bodyHtml;
    card.appendChild(body);

    // Editor (hidden unless editing)
    const editor = document.createElement("div");
    editor.className = "editor";
    editor.innerHTML = `
      <textarea data-key="${escapeHtml(e.key)}" placeholder="Markdown supported (**bold**, *italic*, \`code\`, [link](url), - bullets)"></textarea>
      <div class="editor-meta">
        <span>updated ${fmtDate(e.updatedAt)}</span>
        <span class="editor-actions">
          <button class="editor-btn cancel-btn" type="button">cancel</button>
          <button class="editor-btn primary save-btn" type="button">save</button>
        </span>
      </div>
    `;
    card.appendChild(editor);

    const footer = document.createElement("div");
    footer.className = "note-card-footer";
    footer.textContent = "updated " + fmtDate(e.updatedAt);
    card.appendChild(footer);

    // Wire actions
    const ta = editor.querySelector("textarea");
    ta.value = state.editing === e.key ? state.draft : e.text;
    if (state.editing === e.key) requestAnimationFrame(() => autosize(ta));
    ta.addEventListener("input", () => { state.draft = ta.value; autosize(ta); });
    ta.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") { ev.preventDefault(); cancelEdit(); }
      if ((ev.metaKey || ev.ctrlKey) && ev.key === "Enter") { ev.preventDefault(); saveEdit(e.key); }
    });

    header.querySelector(".edit-btn").onclick = () => {
      state.editing = e.key;
      state.draft = e.text;
      render();
      const t = document.querySelector(`textarea[data-key="${e.key}"]`);
      if (t) { t.focus(); t.setSelectionRange(t.value.length, t.value.length); }
    };
    header.querySelector(".delete-btn").onclick = () => {
      if (!confirm("Delete this note locally? Sync afterwards to remove it on GitHub too.")) return;
      delete state.notes[e.key];
      SYNC.addTombstone(e.key);
      state.dirty = true;
      if (state.editing === e.key) { state.editing = null; state.draft = ""; }
      save();
      render();
      updateSyncStatus();
      toast("note deleted (sync to push)");
    };
    editor.querySelector(".cancel-btn").onclick = cancelEdit;
    editor.querySelector(".save-btn").onclick = () => saveEdit(e.key);

    header.querySelector(".cat-tag").onclick = () => {
      state.catFilter = e.catId;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    feed.appendChild(card);
  });
}

function cancelEdit() {
  state.editing = null;
  state.draft = "";
  render();
}

function saveEdit(key) {
  const text = state.draft;
  if (!text || !text.trim()) {
    if (confirm("Empty content — delete this note locally?")) {
      delete state.notes[key];
      SYNC.addTombstone(key);
      state.dirty = true;
      save();
    }
  } else {
    state.notes[key] = { text, updatedAt: new Date().toISOString() };
    state.dirty = true;
    save();
    toast("saved locally — sync to push");
  }
  state.editing = null;
  state.draft = "";
  render();
  updateSyncStatus();
}

function render() {
  renderFilters();
  renderFeed();
}

document.getElementById("search").addEventListener("input", e => {
  state.query = e.target.value;
  render();
});

document.getElementById("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  render();
});

document.addEventListener("keydown", (e) => {
  const inTextarea = document.activeElement && document.activeElement.tagName === "TEXTAREA";
  const search = document.getElementById("search");
  if (e.key === "/" && document.activeElement !== search && !inTextarea) {
    e.preventDefault();
    search.focus();
  } else if (e.key === "Escape" && document.activeElement === search) {
    search.value = "";
    state.query = "";
    render();
    search.blur();
  }
});

document.getElementById("year").textContent = new Date().getFullYear();

(function () {
  const btn = document.getElementById("theme-toggle");
  if (!btn) return;
  btn.addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    const next = current === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("theme", next); } catch (e) {}
  });
})();

window.addEventListener("storage", (e) => {
  if (e.key === STORAGE_KEY) { load(); render(); updateSyncStatus(); }
});

// ---------- Sync ----------
function fmtRelativeTime(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
  return d.toLocaleDateString();
}

function updateSyncStatus() {
  const el = document.getElementById("sync-status");
  if (!el) return;
  const label = el.querySelector(".sync-label");
  el.classList.remove("dirty", "synced", "error");
  if (state.syncing) {
    el.classList.add("dirty");
    label.textContent = "syncing…";
  } else if (state.dirty) {
    el.classList.add("dirty");
    label.textContent = "unsynced";
  } else if (state.lastSync) {
    el.classList.add("synced");
    label.textContent = "synced " + fmtRelativeTime(state.lastSync);
  } else {
    label.textContent = "not synced";
  }
}

async function doSync() {
  if (state.syncing) return;
  state.syncing = true;
  updateSyncStatus();
  const result = await SYNC.syncNow(state.notes);
  state.syncing = false;
  if (result.ok) {
    state.dirty = false;
    state.lastSync = new Date().toISOString();
    save();
    updateSyncStatus();
    toast("synced to github ✓");
  } else if (result.reason === "no-pat" || result.reason === "bad-pat-cancelled") {
    updateSyncStatus();
  } else {
    const el = document.getElementById("sync-status");
    el.classList.remove("synced", "dirty");
    el.classList.add("error");
    el.querySelector(".sync-label").textContent = "sync failed";
    toast("sync failed — check console");
    console.error("sync failed", result.error);
  }
}

document.getElementById("sync-btn").onclick = doSync;

async function bootstrap() {
  load();
  render();
  updateSyncStatus();
  const remote = await SYNC.loadRemote();
  if (remote !== null) {
    const tombs = SYNC.getTombstones();
    const before = JSON.stringify(state.notes);
    state.notes = SYNC.merge(state.notes, remote, tombs);
    const changed = JSON.stringify(state.notes) !== before;
    save();
    updateSyncStatus();
    if (changed && !state.editing) render();
  }
}

bootstrap();
</script>
</body>
</html>
